<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — UIC Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F8FA;--card:#fff;--line:#E6EBF0;--line-2:#D7DFE7;--ink:#16232E;--ink-3:#93A3B1;
        --teal:#0E8C94;--teal-soft:#E4F4F5;--teal-deep:#0A6A70;--bad:#D64533}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
       min-height:100vh;display:grid;place-items:center;padding:20px}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);
        border-radius:18px;padding:34px 30px;box-shadow:0 4px 12px rgba(22,35,46,.06),
        0 20px 50px rgba(22,35,46,.1);animation:rise .5s cubic-bezier(.2,.7,.3,1)}
  .logo{font-family:'Sora',sans-serif;font-weight:700;font-size:18px;display:flex;
        align-items:center;gap:9px;margin-bottom:4px}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);
             box-shadow:0 0 0 4px var(--teal-soft)}
  p.sub{color:var(--ink-3);font-size:13.5px;margin-bottom:24px}
  label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;color:#5A6B7A}
  input{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 13px;
        font-size:14px;font-family:inherit;color:var(--ink);transition:box-shadow .15s,border-color .15s}
  input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  button{width:100%;margin-top:16px;background:var(--teal);color:#fff;border:none;border-radius:10px;
         padding:12px;font-weight:600;font-size:14.5px;font-family:inherit;cursor:pointer;
         transition:background .15s,transform .15s;box-shadow:0 2px 8px rgba(14,140,148,.25)}
  button:hover{background:var(--teal-deep);transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .err{color:var(--bad);font-size:12.5px;margin-top:12px;min-height:17px;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="dot"></span>UIC Content Studio</div>
  <p class="sub">Sign in to see what your AI agents are working on.</p>
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus>
  <button id="go">Sign in</button>
  <div class="err" id="err"></div>
</div>
<script>
const pw=document.getElementById('pw'),go=document.getElementById('go'),err=document.getElementById('err');
async function submit(){
  err.textContent=''; go.disabled=true; go.textContent='Signing in…';
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw.value})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Sign in failed');
    location.href='/';
  }catch(e){err.textContent=e.message;go.disabled=false;go.textContent='Sign in';pw.select()}
}
go.onclick=submit;
pw.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
</script>
</body>
</html>

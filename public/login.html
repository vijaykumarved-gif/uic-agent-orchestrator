<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — UIC Agent Worklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0E1418;--panel:#151D23;--line:#26333C;--ink:#E2E9ED;--faint:#5B6B76;--scan:#4FD6E6;--bad:#F0553F}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;
       min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{width:100%;max-width:340px}
  .mark{font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:.14em;font-size:12px;
        color:var(--scan);text-transform:uppercase;margin-bottom:6px}
  .mark span{color:var(--faint)}
  p.sub{color:var(--faint);font-size:13px;margin-bottom:22px}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
        text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:5px;
        padding:10px 12px;color:var(--ink);font-size:14px;font-family:inherit}
  input:focus{outline:none;border-color:var(--scan)}
  button{width:100%;margin-top:14px;background:var(--scan);color:#06181C;border:none;border-radius:5px;
         padding:11px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer}
  button:hover{filter:brightness(1.1)}
  button:disabled{opacity:.6;cursor:not-allowed}
  .err{color:var(--bad);font-size:12px;margin-top:10px;font-family:'IBM Plex Mono',monospace;min-height:16px}
</style>
</head>
<body>
<div class="card">
  <div class="mark">UIC <span>/</span> Agent Worklist</div>
  <p class="sub">Sign in to run the pipeline and review published work.</p>

  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus>
  <button id="go">Sign in</button>
  <div class="err" id="err"></div>
</div>

<script>
const pw = document.getElementById('pw');
const go = document.getElementById('go');
const err = document.getElementById('err');

async function submit(){
  err.textContent = '';
  go.disabled = true; go.textContent = 'Signing in…';
  try {
    const r = await fetch('/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw.value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Sign in failed');
    location.href = '/';
  } catch(e){
    err.textContent = e.message;
    go.disabled = false; go.textContent = 'Sign in';
    pw.select();
  }
}

go.onclick = submit;
pw.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>

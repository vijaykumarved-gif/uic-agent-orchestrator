<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UIC Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F8FA; --card:#FFFFFF; --line:#E6EBF0; --line-2:#D7DFE7;
    --ink:#16232E; --ink-2:#5A6B7A; --ink-3:#93A3B1;
    --teal:#0E8C94; --teal-soft:#E4F4F5; --teal-deep:#0A6A70;
    --ok:#1B9E55; --ok-soft:#E5F6EC;
    --warn:#C77E14; --warn-soft:#FCF2DF;
    --bad:#D64533; --bad-soft:#FCEAE7;
    --shadow:0 1px 2px rgba(22,35,46,.05),0 4px 16px rgba(22,35,46,.06);
    --shadow-lg:0 4px 12px rgba(22,35,46,.08),0 16px 40px rgba(22,35,46,.12);
    --sans:'Inter',system-ui,sans-serif; --disp:'Sora',var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;
       -webkit-font-smoothing:antialiased}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  /* entrance animation only on first paint — .first-load scopes it */
  .first-load .rise{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 24px;
         display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
  .logo{font-family:var(--disp);font-weight:700;font-size:16px;display:flex;align-items:center;gap:9px}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
  .logo small{font-weight:400;color:var(--ink-3);font-size:12px;font-family:var(--sans)}
  .spacer{flex:1}
  .live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-3);font-weight:500}
  .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 2s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}

  button{font-family:var(--sans);font-size:13.5px;font-weight:600;border-radius:9px;cursor:pointer;
         border:1px solid var(--line-2);background:var(--card);color:var(--ink);padding:9px 16px;
         transition:all .18s ease}
  button:hover{border-color:var(--teal);color:var(--teal);transform:translateY(-1px)}
  button:active{transform:none}
  button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  button.primary{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(14,140,148,.25)}
  button.primary:hover{background:var(--teal-deep);color:#fff;box-shadow:0 4px 14px rgba(14,140,148,.35)}
  button.ghost{border-color:transparent;color:var(--ink-2)}
  button.ghost:hover{color:var(--teal);transform:none}
  button:disabled{opacity:.55;cursor:not-allowed;transform:none}

  main{max-width:1240px;margin:0 auto;padding:26px 24px 80px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:11.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
  .stat .v{font-family:var(--disp);font-size:28px;font-weight:700;margin-top:2px;transition:transform .3s ease}
  .stat .v.bump{transform:scale(1.12)}
  .stat.teal .v{color:var(--teal)} .stat.ok .v{color:var(--ok)}
  .stat.warn .v{color:var(--warn)} .stat.bad .v{color:var(--bad)}

  .sec-head{display:flex;align-items:baseline;gap:10px;margin:0 0 14px;flex-wrap:wrap}
  h2{font-family:var(--disp);font-size:17px;font-weight:600}
  .sub{font-size:13px;color:var(--ink-3)}

  .runs{display:flex;flex-direction:column;gap:14px}
  .run-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;
            box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s,transform .2s,border-color .2s}
  .run-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--line-2)}

  .run-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .run-brand{font-family:var(--disp);font-weight:600;font-size:15px;text-transform:capitalize}
  .run-topic{color:var(--ink-2);font-size:13.5px;flex:1;min-width:200px;overflow:hidden;
             text-overflow:ellipsis;white-space:nowrap}
  .run-time{font-size:12px;color:var(--ink-3);white-space:nowrap}
  .run-cost{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--teal);white-space:nowrap}

  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
         padding:4px 11px;border-radius:99px;white-space:nowrap}
  .badge::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor}
  .badge.success,.badge.published{background:var(--ok-soft);color:var(--ok)}
  .badge.failed{background:var(--bad-soft);color:var(--bad)}
  .badge.needs_review{background:var(--warn-soft);color:var(--warn)}
  .badge.running,.badge.pending{background:var(--teal-soft);color:var(--teal)}
  .badge.running::before{animation:blink 1s ease-in-out infinite}

  /* process rail */
  .rail{display:flex;align-items:center}
  .step{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .step-icon{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
             border:2px solid var(--line-2);background:var(--card);color:var(--ink-3);
             font-size:15px;transition:all .3s ease}
  .step-label{font-size:12.5px;font-weight:600;color:var(--ink-3);transition:color .3s}
  .step-sub{font-size:11px;color:var(--ink-3)}
  .step.done .step-icon{background:var(--ok);border-color:var(--ok);color:#fff}
  .step.done .step-label{color:var(--ink)}
  .step.active .step-icon{background:var(--teal);border-color:var(--teal);color:#fff;
                          box-shadow:0 0 0 0 rgba(14,140,148,.4);animation:ring 1.6s ease-out infinite}
  @keyframes ring{to{box-shadow:0 0 0 12px rgba(14,140,148,0)}}
  .step.active .step-label{color:var(--teal)}
  .step.fail .step-icon{background:var(--bad);border-color:var(--bad);color:#fff}
  .step.fail .step-label{color:var(--bad)}
  .step.review .step-icon{background:var(--warn);border-color:var(--warn);color:#fff}
  .step.review .step-label{color:var(--warn)}

  .conn{height:3px;flex:1;min-width:34px;background:var(--line);border-radius:2px;margin:0 10px;
        position:relative;overflow:hidden}
  .conn::after{content:'';position:absolute;inset:0;background:var(--ok);border-radius:2px;
               transform:scaleX(0);transform-origin:left;transition:transform .6s cubic-bezier(.2,.7,.3,1)}
  .conn.full::after{transform:scaleX(1)}
  .conn.flowing::after{background:linear-gradient(90deg,var(--ok),var(--teal));transform:scaleX(1);
        animation:flow 1.4s linear infinite;background-size:200% 100%}
  @keyframes flow{from{background-position:100% 0}to{background-position:-100% 0}}

  .run-meta{display:flex;gap:16px;margin-top:13px;font-size:12.5px;color:var(--ink-2);flex-wrap:wrap}
  .run-meta b{color:var(--ink)}
  .run-meta .fail-note{color:var(--bad);font-weight:600}

  .empty{padding:70px 24px;text-align:center;background:var(--card);border:1px dashed var(--line-2);
         border-radius:16px;color:var(--ink-3)}
  .empty b{display:block;color:var(--ink);font-family:var(--disp);font-size:17px;margin-bottom:6px}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(22,35,46,.32);backdrop-filter:blur(2px);
         opacity:0;pointer-events:none;transition:opacity .22s;z-index:20}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(640px,100%);background:var(--bg);
          transform:translateX(102%);transition:transform .28s cubic-bezier(.2,.7,.3,1);
          z-index:21;overflow-y:auto;box-shadow:-12px 0 44px rgba(22,35,46,.14)}
  .drawer.open{transform:none}
  .dhead{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;
         gap:12px;position:sticky;top:0;background:var(--card);z-index:2}
  .dhead h3{font-family:var(--disp);font-size:16px;font-weight:600;flex:1;text-transform:capitalize}
  .dbody{padding:24px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;
        margin-bottom:16px;box-shadow:var(--shadow)}
  .card h4{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--ink-2);
           text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

  .kv{display:grid;grid-template-columns:110px 1fr;gap:8px 14px;font-size:13.5px}
  .kv dt{color:var(--ink-3);font-weight:500}
  .kv dd{word-break:break-word}

  .caption-box{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;
               font-size:13px;white-space:pre-wrap;line-height:1.6;max-height:180px;overflow-y:auto}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{background:var(--teal-soft);color:var(--teal-deep);font-size:12px;font-weight:500;
       padding:3px 10px;border-radius:99px}

  .score-wrap{display:flex;align-items:center;gap:12px}
  .score-bar{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .score-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--warn),var(--ok));
              animation:grow .8s cubic-bezier(.2,.7,.3,1) both}
  @keyframes grow{from{width:0}}
  .score-num{font-family:var(--disp);font-weight:700;font-size:16px}

  .thumb{width:100%;max-width:220px;border-radius:12px;border:1px solid var(--line);display:block;
         box-shadow:var(--shadow)}
  .asset-link{display:inline-flex;align-items:center;gap:7px;color:var(--teal);font-weight:600;
              font-size:13px;text-decoration:none;margin:4px 14px 4px 0}
  .asset-link:hover{text-decoration:underline}

  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:8px 0;display:flex;align-items:center;gap:10px;
           animation:rise .4s ease both}
  .tl-item .node{position:absolute;left:-26px;top:50%;transform:translateY(-50%);width:20px;height:20px;
                 border-radius:50%;display:grid;place-items:center;font-size:11px;color:#fff;background:var(--ink-3)}
  .tl-item.success .node{background:var(--ok)}
  .tl-item.failed .node{background:var(--bad)}
  .tl-item.needs_review .node{background:var(--warn)}
  .tl-name{font-weight:600;font-size:13.5px}
  .tl-desc{font-size:12px;color:var(--ink-3)}
  .tl-time{font-size:12px;color:var(--ink-3);white-space:nowrap}
  .tl-cost{font-family:var(--disp);font-size:12px;font-weight:600;color:var(--teal);min-width:52px;text-align:right}
  .tl-err{margin:2px 0 8px;padding:10px 13px;background:var(--bad-soft);color:#8C2C1F;
          border-radius:9px;font-size:12.5px;line-height:1.5;word-break:break-word}
  .tl-err b{display:block;color:var(--bad);margin-bottom:3px;font-size:12px}

  .pub-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .pub-row:last-child{border-bottom:none}
  .pub-row .plat{font-weight:600;flex:1;text-transform:capitalize}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);
         background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;
         font-weight:500;transition:transform .25s cubic-bezier(.2,.7,.3,1);z-index:30;box-shadow:var(--shadow-lg)}
  .toast.show{transform:translateX(-50%)}
  .toast.err{background:var(--bad)} .toast.ok{background:var(--ok)}

  .modal-scrim{position:fixed;inset:0;background:rgba(22,35,46,.32);backdrop-filter:blur(2px);
               display:none;place-items:center;z-index:25;padding:20px}
  .modal-scrim.open{display:grid;animation:fadeIn .18s ease}
  .modal{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;
         max-width:420px;padding:26px;animation:rise .28s cubic-bezier(.2,.7,.3,1)}
  .modal h3{font-family:var(--disp);font-size:17px;margin-bottom:4px}
  .modal p{color:var(--ink-3);font-size:13px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select{width:100%;border:1px solid var(--line-2);border-radius:10px;
        padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--card)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  @media (max-width:640px){
    .step-label-wrap{display:none}
    .run-topic{white-space:normal}
  }
</style>
</head>
<body class="first-load">

<header class="rise">
  <div class="logo"><span class="dot"></span>UIC Content Studio <small>AI agents for growth</small></div>
  <div class="spacer"></div>
  <span class="live"><span class="pulse"></span>Live — updates automatically</span>
  <button id="refresh" class="ghost">↻ Refresh</button>
  <button id="runBtn" class="primary">+ New post</button>
  <button id="logout" class="ghost">Sign out</button>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="sec-head rise">
    <h2>Content runs</h2>
    <span class="sub">Each run is one post's journey from research to publish. Click a card for details.</span>
  </div>
  <div class="runs" id="runs"></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Run detail">
  <div class="dhead">
    <h3 id="dtitle">Run detail</h3>
    <button id="dclose" class="ghost">✕ Close</button>
  </div>
  <div class="dbody" id="dbody"></div>
</aside>

<div class="modal-scrim" id="modalScrim">
  <div class="modal">
    <h3>Create a new post</h3>
    <p>Agents will research a topic, create the content, and publish it. Takes 2–5 minutes.</p>
    <div class="field">
      <label for="mBrand">Brand</label>
      <select id="mBrand">
        <option value="usmanpura_imaging">Usmanpura Imaging</option>
        <option value="pixel_diagnostics">Pixel Diagnostics</option>
        <option value="airmed_patholab">Airmed Patholab</option>
        <option value="urja_diagnostics">Urja Diagnostics</option>
      </select>
    </div>
    <div class="field">
      <label for="mTopic">Topic <span style="font-weight:400;color:var(--ink-3)">(leave empty — Trend Agent will pick one)</span></label>
      <input id="mTopic" placeholder="e.g. MRI myths, dengue testing…">
    </div>
    <div class="modal-actions">
      <button id="mCancel">Cancel</button>
      <button id="mGo" class="primary">Start</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* Friendly English names + one-line explanation for every agent */
const AGENT_INFO = {
  trend_agent:            ['Trend research',    'Finds what is relevant right now via web search'],
  competitor_agent:       ['Competitor check',  'Looks at what competitors are posting'],
  script_agent:           ['Script writing',    'Writes the reel script'],
  caption_agent:          ['Caption',           'Writes the post caption'],
  hashtag_agent:          ['Hashtags',          'Picks the right hashtag mix'],
  image_agent:            ['Image generation',  'Creates the post image with AI'],
  thumbnail_agent:        ['Thumbnail',         'Creates the reel cover image'],
  voice_agent:            ['Voiceover',         'Converts the script to speech'],
  subtitle_agent:         ['Subtitles',         'Generates timed captions for the video'],
  video_agent:            ['Video assembly',    'Combines image + voice + subtitles into a reel'],
  viral_prediction_agent: ['Quality score',     'Scores how well the post is likely to perform'],
  instagram_publisher:    ['Instagram post',    'Publishes to Instagram'],
  facebook_publisher:     ['Facebook post',     'Publishes to Facebook'],
  youtube_shorts_publisher:['YouTube Short',    'Publishes to YouTube'],
  linkedin_publisher:     ['LinkedIn post',     'Publishes to LinkedIn'],
  lead_qualification_agent:['Lead check',       'Decides if a comment/DM is a real lead'],
  crm_agent:              ['CRM entry',         'Saves the lead to CRM'],
  whatsapp_agent:         ['WhatsApp follow-up','Sends a WhatsApp message to the lead'],
  analytics_agent:        ['Analytics',         'Pulls performance metrics for posts'],
  revenue_optimization_agent:['Revenue analysis','Reports what is working and what is not'],
};

const STAGE_STEPS = [
  { key:'intelligence', label:'Research', sub:'Trends + competitors', icon:'🔍' },
  { key:'creation',     label:'Create',   sub:'Script, image, video', icon:'✨' },
  { key:'distribution', label:'Publish',  sub:'Social platforms',     icon:'🚀' },
];

const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function ago(ts){
  const s = Math.floor((Date.now()-new Date(ts))/1000);
  if (s<60) return s+'s ago';
  if (s<3600) return Math.floor(s/60)+'m ago';
  if (s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function toast(msg,kind){
  const t=$('toast'); t.textContent=msg; t.className='toast show '+(kind||'');
  setTimeout(()=>t.className='toast '+(kind||''),4000);
}

function statusLabel(s){
  return {success:'Complete',published:'Published',failed:'Failed',
          needs_review:'Needs review',running:'Running',pending:'Queued'}[s]||s;
}

function rail(run){
  const idx = STAGE_STEPS.findIndex(s=>s.key===run.stage);
  const done = run.stage==='done';
  const failed = run.status==='failed';
  const review = run.status==='needs_review';

  let html = '<div class="rail">';
  STAGE_STEPS.forEach((s,i)=>{
    let cls='', icon=s.icon;
    if (done || i<idx){ cls='done'; icon='✓'; }
    else if (i===idx){
      cls = failed?'fail':review?'review':'active';
      icon = failed?'✕':review?'!':s.icon;
    }
    html += '<div class="step '+cls+'"><div class="step-icon">'+icon+'</div>'+
      '<div class="step-label-wrap"><div class="step-label">'+s.label+'</div>'+
      '<div class="step-sub">'+s.sub+'</div></div></div>';
    if (i<STAGE_STEPS.length-1){
      const connCls = (done||i<idx)?'full':(i===idx && !failed && !review)?'flowing':'';
      html += '<div class="conn '+connCls+'"></div>';
    }
  });
  return html+'</div>';
}

/* ---------- smart refresh ----------
   Poll in the background, but ONLY touch the DOM when the data actually
   changed. This is what stops the page from visibly "refreshing" every
   few seconds. A fingerprint of the payload is compared; identical -> skip. */
let statsFp='', runsFp='';
let firstPaint=true;

async function loadStats(){
  const r = await fetch('/api/stats');
  if (r.status===401){location.href='/login';return}
  const s = await r.json();
  const fp = JSON.stringify(s);
  if (fp===statsFp) return;          // nothing changed -> no re-render
  const prev = statsFp ? JSON.parse(statsFp) : null;
  statsFp = fp;

  const items=[
    ['Total runs',s.total_runs,'',           'total_runs'],
    ['Published',s.published,'ok',           'published'],
    ['Needs review',s.needs_review,'warn',   'needs_review'],
    ['Failed',s.failed,'bad',                'failed'],
    ['Leads',s.leads,'',                     'leads'],
    ['Spend',(s.total_cost!=null?'$'+Number(s.total_cost).toFixed(2):'—'),'teal','total_cost'],
  ];
  $('stats').innerHTML = items.map(([k,v,cls])=>
    '<div class="stat '+cls+' rise"><div class="k">'+k+'</div>'+
    '<div class="v" data-k="'+k+'">'+v+'</div></div>').join('');

  if (prev){ // bump only the numbers that changed
    items.forEach(([k,,,key])=>{
      if (String(prev[key])!==String(s[key])){
        const el=document.querySelector('.v[data-k="'+k+'"]');
        if (el){el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),350)}
      }
    });
  }
}

async function loadRuns(){
  const r = await fetch('/api/runs');
  if (r.status===401){location.href='/login';return}
  const runs = await r.json();

  // Fingerprint ignores created_at-relative text; includes everything that
  // affects what's drawn. "Xs ago" alone shouldn't trigger a redraw.
  const fp = JSON.stringify(runs.map(x=>[x.id,x.stage,x.status,x.ok_agents,x.failed_agents,x.total_agents,x.cost]));
  if (fp===runsFp) { updateTimes(runs); return; }
  runsFp = fp;

  const el = $('runs');
  if (!runs.length){
    el.innerHTML = '<div class="empty rise"><b>No runs yet</b>'+
      'Click "New post" — the agents will handle everything from research to publishing.</div>';
    return;
  }

  el.innerHTML = runs.map(run=>{
    const topic = (run.script&&run.script.hook) ||
      (run.trend_source&&run.trend_source.trends&&run.trend_source.trends[0]&&run.trend_source.trends[0].topic) || '';
    const failNote = run.failed_agents>0
      ? '<span class="fail-note">'+run.failed_agents+' step'+(run.failed_agents>1?'s':'')+' failed — click to see why</span>' : '';
    return '<div class="run-card rise" data-id="'+run.id+'">'+
      '<div class="run-top">'+
        '<span class="run-brand">'+esc(run.brand.replace(/_/g,' '))+'</span>'+
        '<span class="badge '+esc(run.status)+'">'+statusLabel(run.status)+'</span>'+
        '<span class="run-topic">'+esc(topic)+'</span>'+
        '<span class="run-cost">$'+Number(run.cost||0).toFixed(3)+'</span>'+
        '<span class="run-time" data-ts="'+run.created_at+'">'+ago(run.created_at)+'</span>'+
      '</div>'+
      rail(run)+
      '<div class="run-meta"><span><b>'+(run.ok_agents||0)+'</b> / '+(run.total_agents||0)+
      ' steps complete</span>'+failNote+'</div></div>';
  }).join('');

  el.querySelectorAll('.run-card').forEach(c=>
    c.addEventListener('click',()=>openRun(c.dataset.id)));
}

/* Update only the "Xm ago" text in place — no re-render, no flicker */
function updateTimes(){
  document.querySelectorAll('.run-time[data-ts]').forEach(el=>{
    el.textContent = ago(el.dataset.ts);
  });
}

/* ---------- drawer ---------- */
async function openRun(id){
  const r = await fetch('/api/runs/'+id);
  if (!r.ok) return toast('Could not load that run','err');
  const d = await r.json();
  const run=d.run, a=run.assets||{};

  $('dtitle').textContent = run.brand.replace(/_/g,' ');

  let html = '<div class="card"><h4>Status</h4>'+rail(run)+
    '<div class="kv" style="margin-top:16px">'+
    '<dt>Status</dt><dd><span class="badge '+esc(run.status)+'">'+statusLabel(run.status)+'</span></dd>'+
    '<dt>Started</dt><dd>'+new Date(run.created_at).toLocaleString('en-IN')+'</dd>'+
    '<dt>Run ID</dt><dd style="color:var(--ink-3);font-size:12px">'+run.id+'</dd></div></div>';

  if (run.script){
    html += '<div class="card"><h4>Content</h4><div class="kv">'+
      '<dt>Hook</dt><dd><b>'+esc(run.script.hook||'—')+'</b></dd>'+
      (run.script.cta?'<dt>Call to action</dt><dd>'+esc(run.script.cta)+'</dd>':'')+'</div>';
    if (a.caption_agent&&a.caption_agent.caption)
      html += '<div style="margin-top:12px"><div style="font-size:12.5px;font-weight:500;color:var(--ink-3);margin-bottom:6px">Caption</div>'+
        '<div class="caption-box">'+esc(a.caption_agent.caption)+'</div></div>';
    if (a.hashtag_agent&&a.hashtag_agent.hashtags&&a.hashtag_agent.hashtags.length)
      html += '<div class="tags">'+a.hashtag_agent.hashtags.map(h=>'<span class="tag">'+esc(h)+'</span>').join('')+'</div>';
    html += '</div>';
  }

  if (a.viral_prediction_agent&&a.viral_prediction_agent.predicted_score!=null){
    const sc=a.viral_prediction_agent.predicted_score;
    html += '<div class="card"><h4>Quality score</h4><div class="score-wrap">'+
      '<div class="score-bar"><div class="score-fill" style="width:'+(sc*100)+'%"></div></div>'+
      '<span class="score-num">'+(sc*10).toFixed(1)+'/10</span></div>'+
      (a.viral_prediction_agent.reasoning?'<p style="margin-top:10px;font-size:13px;color:var(--ink-2)">'+
        esc(a.viral_prediction_agent.reasoning)+'</p>':'')+'</div>';
  }

  const img=a.image_agent&&a.image_agent.image_urls&&a.image_agent.image_urls[0];
  const vid=a.video_agent&&a.video_agent.video_url;
  const aud=a.voice_agent&&a.voice_agent.audio_url;
  if (img||vid||aud){
    html += '<div class="card"><h4>Generated assets</h4>';
    if (img) html += '<img class="thumb" src="'+esc(img)+'" alt="Generated image" loading="lazy">';
    html += '<div style="margin-top:10px">';
    if (vid) html += '<a class="asset-link" href="'+esc(vid)+'" target="_blank" rel="noopener">▶ Watch video</a>';
    if (aud) html += '<a class="asset-link" href="'+esc(aud)+'" target="_blank" rel="noopener">♪ Listen to voiceover</a>';
    html += '</div></div>';
  }

  if (d.posts&&d.posts.length){
    html += '<div class="card"><h4>Published to</h4>';
    d.posts.forEach(p=>{
      const link=p.metrics&&p.metrics.permalink;
      html += '<div class="pub-row"><span class="plat">'+esc(p.platform.replace(/_/g,' '))+'</span>'+
        (link?'<a class="asset-link" href="'+esc(link)+'" target="_blank" rel="noopener">Open post ↗</a>'
             :'<span style="color:var(--ink-3);font-size:12px">'+esc(p.external_post_id||'')+'</span>')+'</div>';
    });
    html += '</div>';
  }

  html += '<div class="card"><h4>Step-by-step breakdown</h4><div class="tl">';
  html += d.agents.map((ag,i)=>{
    const info = AGENT_INFO[ag.agent_name]||[ag.agent_name,''];
    const icon = ag.status==='success'?'✓':ag.status==='failed'?'✕':'!';
    let row = '<div class="tl-item '+esc(ag.status)+'" style="animation-delay:'+(i*0.045)+'s">'+
      '<span class="node">'+icon+'</span>'+
      '<div style="flex:1"><div class="tl-name">'+esc(info[0])+'</div>'+
      '<div class="tl-desc">'+esc(info[1])+'</div></div>'+
      '<span class="tl-time">'+((ag.duration_ms||0)/1000).toFixed(1)+'s</span>'+
      '<span class="tl-cost">$'+Number(ag.cost_usd||0).toFixed(3)+'</span></div>';
    if (ag.error) row += '<div class="tl-err"><b>What went wrong:</b>'+esc(friendlyError(ag.error))+'</div>';
    return row;
  }).join('');
  html += '</div></div>';

  $('dbody').innerHTML=html;
  $('drawer').classList.add('open');
  $('scrim').classList.add('open');
}

/* Translate raw API errors into plain instructions where the pattern is known */
function friendlyError(err){
  if (/billing.hard.limit|billing_limit/i.test(err))
    return 'OpenAI billing limit reached. Go to platform.openai.com → Settings → Limits and raise the monthly limit. ('+err.slice(0,110)+'…)';
  if (/not set/i.test(err))
    return err+' — add this key in Render → Environment.';
  if (/401|invalid.*key|authentication/i.test(err))
    return 'API key is wrong or expired. Check it in Render → Environment. ('+err.slice(0,110)+'…)';
  if (/429|rate.limit|quota/i.test(err))
    return 'API rate limit hit — try again in a few minutes. ('+err.slice(0,100)+'…)';
  return err;
}

function drawerOpen(){return $('drawer').classList.contains('open')}
function modalOpen(){return $('modalScrim').classList.contains('open')}

function closeDrawer(){$('drawer').classList.remove('open');$('scrim').classList.remove('open')}
$('dclose').onclick=closeDrawer;
$('scrim').onclick=closeDrawer;
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();$('modalScrim').classList.remove('open')}});

/* ---------- new post modal ---------- */
$('runBtn').onclick=()=>$('modalScrim').classList.add('open');
$('mCancel').onclick=()=>$('modalScrim').classList.remove('open');
$('modalScrim').addEventListener('click',e=>{if(e.target===$('modalScrim'))$('modalScrim').classList.remove('open')});

$('mGo').onclick=async()=>{
  const btn=$('mGo'); btn.disabled=true; btn.textContent='Starting…';
  try{
    const body={brand:$('mBrand').value,platforms:['instagram']};
    const topic=$('mTopic').value.trim();
    if (topic) body.topic=topic;
    const r=await fetch('/pipeline/run',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error((await r.json()).error||'Could not start');
    $('modalScrim').classList.remove('open');
    toast('Pipeline started — takes 2–5 minutes. The board updates on its own.','ok');
    setTimeout(loadAll,1200);
  }catch(e){toast(e.message,'err')}
  finally{btn.disabled=false;btn.textContent='Start'}
};

$('refresh').onclick=()=>{statsFp='';runsFp='';loadAll();toast('Refreshed','ok')};
$('logout').onclick=async()=>{await fetch('/logout',{method:'POST'});location.href='/login'};

function loadAll(){loadStats();loadRuns()}

loadAll().then?.(()=>{});
/* entrance animations only once — after first paint, new renders appear without replaying them */
setTimeout(()=>document.body.classList.remove('first-load'),900);

/* Background poll: skips DOM work when nothing changed, and pauses entirely
   while the drawer or modal is open so nothing moves under the user. */
setInterval(()=>{
  if (document.hidden || drawerOpen() || modalOpen()) return;
  loadAll();
},8000);
/* Relative times tick every 30s without any re-render */
setInterval(updateTimes,30000);
</script>
</body>
